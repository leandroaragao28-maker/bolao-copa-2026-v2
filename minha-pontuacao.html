<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A237E">
  <title>Minha pontuação — Bolão Copa 2026 v2</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    /* Hero */
    .mp-hero { background:linear-gradient(135deg,#0C1356 0%,#1A237E 45%,#283593 100%); border-radius:20px; padding:1.7rem 1.2rem; color:#fff; text-align:center; position:relative; overflow:hidden; margin-bottom:1rem; box-shadow:0 10px 34px rgba(13,19,86,.4); }
    .mp-hero::after { content:'⚽'; position:absolute; right:-1.2rem; top:50%; transform:translateY(-50%) rotate(8deg); font-size:9rem; opacity:.14; }
    .mp-hero .conf { position:absolute; left:0; top:0; width:45%; height:100%; opacity:.5; background:radial-gradient(circle at 18% 28%, #FFD54F 0 4px, transparent 5px),radial-gradient(circle at 35% 65%, #4FC3F7 0 3px, transparent 4px),radial-gradient(circle at 12% 78%, #EF5350 0 3px, transparent 4px),radial-gradient(circle at 42% 20%, #66BB6A 0 3px, transparent 4px); }
    .mp-hero .lbl { font-size:.72rem; font-weight:800; letter-spacing:.2em; opacity:.85; text-transform:uppercase; position:relative; }
    .mp-hero .num { font-size:4rem; font-weight:900; line-height:1; letter-spacing:-.04em; margin:.05rem 0 .1rem; text-shadow:0 3px 14px rgba(0,0,0,.35); position:relative; }
    .mp-hero .pos { display:inline-flex; align-items:center; gap:.45rem; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28); border-radius:22px; padding:.4rem 1rem; font-size:.85rem; font-weight:800; margin-top:.4rem; position:relative; }

    /* Botões de etapa (navegação + resumo por etapa) */
    .stabs { display:flex; gap:.45rem; overflow-x:auto; padding-bottom:.5rem; margin-bottom:1rem; }
    .stab { flex-shrink:0; background:#fff; border:2px solid var(--cinza-borda); border-radius:13px; padding:.5rem .7rem; cursor:pointer; text-align:center; min-width:78px; transition:all .15s; }
    .stab-lbl { display:block; font-size:.6rem; font-weight:800; color:var(--cinza-sub); text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; }
    .stab-pts { display:block; font-size:1.2rem; font-weight:900; color:var(--azul); margin-top:.1rem; line-height:1; }
    .stab.active { border-color:var(--azul); background:var(--azul); }
    .stab.active .stab-lbl { color:rgba(255,255,255,.8); }
    .stab.active .stab-pts { color:#fff; }

    /* Card de detalhe */
    .mp-card { background:#fff; border-radius:18px; box-shadow:0 3px 16px rgba(13,19,86,.06); padding:1.1rem 1rem; margin-bottom:1rem; }
    .mp-sec { display:flex; align-items:center; gap:.6rem; margin-bottom:.9rem; }
    .mp-sec .star { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#1A237E,#3949AB); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .mp-sec h3 { font-size:1.08rem; font-weight:900; color:var(--azul); line-height:1.15; }
    .mp-sec h3 small { display:block; font-size:.66rem; font-weight:700; color:var(--cinza-sub); }
    .stage-total { margin-left:auto; font-weight:900; font-size:.95rem; color:var(--azul); background:var(--azul-fundo); border-radius:20px; padding:.35rem .8rem; white-space:nowrap; }

    /* Camada 1 (Classificados) — escudos */
    .mp-legenda { display:flex; gap:1rem; flex-wrap:wrap; font-size:.7rem; font-weight:700; color:var(--cinza-sub); margin-bottom:.8rem; padding-bottom:.6rem; border-bottom:1px solid #EEF1F6; }
    .mp-legenda i { width:.9rem; height:.9rem; border-radius:3px; display:inline-block; vertical-align:-2px; margin-right:.3rem; }
    .mp-legenda .g { background:#81C784; } .mp-legenda .y { background:#FFD54F; }
    .erow { display:flex; align-items:center; gap:.7rem; padding:.65rem .15rem; border-bottom:1px solid #EEF1F6; }
    .erow:last-child { border-bottom:none; }
    .ehex { position:relative; width:44px; height:48px; flex-shrink:0; }
    .ehex::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,#FFCA28,#F9A825); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); }
    .ehex span { position:absolute; inset:2px; background:linear-gradient(150deg,#1A237E,#3949AB); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:1.15rem; }
    .einfo2 { flex:1; min-width:0; display:grid; grid-template-columns:max-content 1fr 1fr; gap:.35rem .45rem; align-items:center; }
    .slot { display:flex; align-items:center; gap:.3rem; font-weight:800; font-size:.84rem; padding:.16rem .42rem; border-radius:7px; min-width:0; }
    .slot .med { font-size:.85rem; flex-shrink:0; } .slot .bd { font-size:1.05rem; flex-shrink:0; }
    .slot.ok { background:#E8F5E9; color:#1B5E20; box-shadow:inset 0 0 0 1.6px #81C784; }
    .slot.warn { background:#FFF8E1; color:#F57F17; box-shadow:inset 0 0 0 1.6px #FFD54F; }
    .slot.em, .slot.semp { color:var(--cinza-sub); font-weight:700; font-size:.78rem; grid-column:2 / -1; }
    .tag { font-size:.58rem; font-weight:800; padding:.13rem .42rem; border-radius:5px; text-transform:uppercase; letter-spacing:.03em; }
    .tag.voce { background:#E3F2FD; color:#1565C0; } .tag.real { background:#E8F5E9; color:#2E7D32; }
    .epts { flex-shrink:0; font-weight:900; font-size:.95rem; padding:.4rem .7rem; border-radius:22px; min-width:3rem; text-align:center; }
    .epts.win { background:#E8F5E9; color:#2E7D32; } .epts.zero { background:#F1F3F5; color:#9AA5B1; } .epts.wait { background:#FFF3E0; color:#E65100; }
    .fase-sub { font-size:.7rem; font-weight:800; color:#7B1FA2; background:#F3E5F5; display:inline-block; padding:.2rem .6rem; border-radius:20px; margin:.6rem 0 .4rem; }

    /* Mata-mata compacto + cores por nível */
    .t15 { background:#E8F5E9; color:#1B5E20; } .t10 { background:#E0F2F1; color:#00695C; }
    .t7 { background:#FFF8E1; color:#F57F17; } .t5 { background:#FFE0CC; color:#BF360C; } .t0 { background:#F1F3F5; color:#9AA5B1; }
    .av-g { background:#E8F5E9; color:#1B5E20; } .av-0 { background:#F1F3F5; color:#9AA5B1; }
    .mm-leg { display:flex; flex-wrap:wrap; gap:.45rem .85rem; font-size:.65rem; font-weight:700; color:var(--cinza-sub); margin-bottom:.7rem; padding-bottom:.5rem; border-bottom:1px solid #EEF1F6; }
    .mm-leg span { display:inline-flex; align-items:center; gap:.3rem; } .mm-leg i { width:.85rem; height:.85rem; border-radius:3px; display:inline-block; }
    .jmm { border:1px solid var(--cinza-borda); border-radius:11px; padding:.5rem .55rem; margin-bottom:.5rem; }
    .jmm-head { display:flex; align-items:center; justify-content:center; gap:.45rem; font-weight:900; font-size:.9rem; margin-bottom:.45rem; }
    .jmm-head .bd { font-size:1.25rem; } .jmm-head .x { color:var(--cinza-sub); font-weight:600; }
    .jmm-grid { display:grid; grid-template-columns:auto 1fr auto 1fr auto; grid-template-areas:"ppl pv lv av pav" "ppl pr lr ar pav"; align-items:center; column-gap:.5rem; row-gap:.22rem; }
    .g-ppl{grid-area:ppl;} .g-pav{grid-area:pav;} .g-pv{grid-area:pv;} .g-pr{grid-area:pr;} .g-lv{grid-area:lv;} .g-lr{grid-area:lr;} .g-av{grid-area:av;} .g-ar{grid-area:ar;}
    .col-pl { text-align:right; } .col-av { text-align:left; } .lbl-mid { display:flex; justify-content:center; }
    .val { font-size:.84rem; font-weight:800; color:var(--cinza-texto); white-space:nowrap; } .val.ref { color:var(--cinza-sub); font-weight:700; }
    .hl { padding:.05rem .34rem; border-radius:5px; }
    .pts { font-weight:900; font-size:.82rem; padding:.2rem .55rem; border-radius:20px; align-self:center; white-space:nowrap; }
  </style>
</head>
<body>

<header>
  <span class="logo">📊</span>
  <div class="header-texto"><h1>Minha pontuação</h1><p id="hdrNome"></p></div>
  <nav>
    <a href="index.html">Início</a>
    <a href="jogos.html">Jogos</a>
    <a href="ranking.html">Ranking</a>
    <a href="minha-pontuacao.html" class="ativo">Pontuação</a>
    <a href="regulamento.html">Regras</a>
    <a onclick="logout()" style="cursor:pointer;">Sair</a>
  </nav>
</header>

<div class="container">

  <div id="bannerPagamento" class="banner-pagamento" style="display:none;">
    <span>⏳ <strong>Pagamento pendente.</strong> Sua pontuação só conta no ranking após a confirmação.</span>
    <a href="cadastro.html?pagar=1">💳 Pagar</a>
  </div>

  <div class="mp-hero" id="hero" style="display:none;">
    <div class="conf"></div>
    <div class="lbl">Pontuação total</div>
    <div class="num" id="totalPts">0</div>
    <div class="pos" id="posicaoTxt">—</div>
  </div>

  <!-- Botões de etapa -->
  <div class="stabs" id="stabs" style="display:none;"></div>

  <!-- Detalhe da etapa selecionada -->
  <div class="mp-card" id="detalhe"><div class="vazio">Carregando…</div></div>

</div>

<script>
let RP = null, MEU = null, ACTIVE = 'grupos';

const STAGES = [
  { key:'grupos',  label:'Classificados', icon:'🏆', sub:'Classificação dos grupos' },
  { key:'32',      label:'Rodada de 32',  icon:'⚽', sub:'quem avança + placar', fases:['32'] },
  { key:'oitavas', label:'Oitavas',       icon:'⚽', sub:'quem avança + placar', fases:['oitavas'] },
  { key:'quartas', label:'Quartas',       icon:'⚽', sub:'quem avança + placar', fases:['quartas'] },
  { key:'semis',   label:'Semis',         icon:'⚽', sub:'quem avança + placar', fases:['semis'] },
  { key:'finais',  label:'Final · 3º',    icon:'🏆', sub:'quem avança + placar', fases:['3lugar','final'] },
];

function fnum(n) { return Number(n).toFixed(1).replace(/\.0$/, ''); }

async function init() {
  const perfil = await exigirLogin();
  if (!perfil) return;
  document.getElementById('hdrNome').textContent = perfil.nome;

  const [rp, rg] = await Promise.all([
    api({ action: 'getMinhaPontuacao', token: getToken() }),
    api({ action: 'getPalpiteGrupos', token: getToken() })
  ]);
  if (!rp.ok) { toast(rp.msg || 'Erro.', 'erro'); return; }
  RP = rp; MEU = rg.ok ? rg.dados : null;
  if (!rp.aprovado) document.getElementById('bannerPagamento').style.display = 'flex';

  document.getElementById('hero').style.display = '';
  document.getElementById('stabs').style.display = '';
  document.getElementById('totalPts').textContent = fnum(rp.totalPontos || 0);
  document.getElementById('posicaoTxt').innerHTML = rp.posicao
    ? `📊 Posição <strong>${rp.posicao}º</strong> de ${rp.totalParticipantes}`
    : (rp.aprovado ? 'Aguardando resultados' : 'Liberada após pagamento');

  renderTabs();
  renderDetail();
}

function stagePts(stage) {
  if (stage.key === 'grupos') return RP.camada1.pontos || 0;
  let s = 0;
  (RP.mataMata || []).forEach(j => { if (stage.fases.indexOf(j.fase) >= 0) s += (Number(j.ptsAvanca || 0) + Number(j.ptsPlacar || 0)); });
  return s;
}

function renderTabs() {
  document.getElementById('stabs').innerHTML = STAGES.map(s =>
    `<div class="stab ${s.key === ACTIVE ? 'active' : ''}" onclick="selStage('${s.key}')">
      <span class="stab-lbl">${s.label}</span>
      <span class="stab-pts">${fnum(stagePts(s))}</span>
    </div>`).join('');
}

function selStage(key) { ACTIVE = key; renderTabs(); renderDetail(); }

function renderDetail() {
  const stage = STAGES.find(s => s.key === ACTIVE);
  const cont = document.getElementById('detalhe');
  cont.innerHTML = `<div class="mp-sec"><div class="star">${stage.icon}</div><h3>${stage.label}<small>${stage.sub}</small></h3>
    <span class="stage-total">${fnum(stagePts(stage))} pts</span></div>` +
    (stage.key === 'grupos' ? htmlGrupos() : htmlKnockout(stage.fases));
  aplicarTwemoji(cont);
}

// ── Classificados (grupos) ──
function slot(sigla, medal, cls) {
  if (!sigla) return '<span class="slot"></span>';
  return `<span class="slot ${cls}" title="${nomeTime(sigla)}"><span class="med">${medal}</span><span class="bd">${bandeira(sigla)}</span><span class="cod">${sigla}</span></span>`;
}
function htmlGrupos() {
  const classif = RP.classificacaoReal || { porGrupo: {} };
  const det = RP.camada1.detalhe || { porGrupo: {}, terceiros: [] };
  const grupos = Object.keys(classif.porGrupo).sort();
  if (!grupos.length) return '<div class="vazio">Sem dados ainda.</div>';
  let html = '<div class="mp-legenda"><span><i class="g"></i>acertou time e posição (+5)</span><span><i class="y"></i>acertou só o time (+3)</span></div>';
  grupos.forEach(g => {
    const real = classif.porGrupo[g] || {};
    const meuG = (MEU && MEU.grupos && MEU.grupos[g]) || {};
    const pts = det.porGrupo[g] ? det.porGrupo[g].pontos : null;
    function cls(meuPos, posExata, posOutra) {
      if (!real.completo || !meuPos) return '';
      if (meuPos === posExata) return 'ok';
      if (meuPos === posOutra) return 'warn';
      return '';
    }
    const voce = (meuG.pos1 || meuG.pos2)
      ? slot(meuG.pos1, '🥇', cls(meuG.pos1, real.pos1, real.pos2)) + slot(meuG.pos2, '🥈', cls(meuG.pos2, real.pos2, real.pos1))
      : '<span class="slot semp">sem palpite</span>';
    const reais = real.completo
      ? slot(real.pos1, '🥇', '') + slot(real.pos2, '🥈', '')
      : '<span class="slot em">em andamento</span>';
    html += `<div class="erow">
      <div class="ehex"><span>${g}</span></div>
      <div class="einfo2"><span class="tag voce">Você</span>${voce}<span class="tag real">Real</span>${reais}</div>
      ${real.completo ? ptsPill(pts || 0) : ptsPill(null)}
    </div>`;
  });
  if (det.terceiros && det.terceiros.length) {
    const certos = det.terceiros.filter(t => t.acerto).length;
    html += `<div class="fase-sub" style="color:var(--ouro-escuro);background:var(--ouro-claro);margin-top:1rem;">🥉 Melhores terceiros · ${certos} certo(s) · +${certos * 2}</div>
      <div class="terceiros-grid" style="margin-top:.5rem;">
        ${det.terceiros.map(t => `<div class="terceiro-chip ${t.acerto ? 'sel' : ''}" style="cursor:default;"><span class="bd">${bandeira(t.code)}</span><span>${nomeTime(t.code)}</span>${t.acerto ? ' ✅' : ''}</div>`).join('')}
      </div>`;
  }
  return html;
}
function ptsPill(v) {
  if (v == null) return '<div class="epts wait">—</div>';
  const n = Number(v);
  return `<div class="epts ${n > 0 ? 'win' : 'zero'}">${n > 0 ? '+' : ''}${fnum(n)}</div>`;
}

// ── Knockout (etapas do mata-mata) ──
function plTier(p) { return p >= 15 ? 't15' : p >= 10 ? 't10' : p >= 7.5 ? 't7' : p >= 5 ? 't5' : 't0'; }
function fmtP(p) { return p === 7.5 ? '7,5' : String(p); }
function htmlKnockout(fases) {
  const jogos = (RP.mataMata || []).filter(j => fases.indexOf(j.fase) >= 0);
  if (!jogos.length) return '<div class="vazio">⏳ Confrontos desta fase ainda não definidos.</div>';
  let html = `<div class="mm-leg">
    <span><i class="t15"></i>exato 15</span><span><i class="t10"></i>vencedor 10</span>
    <span><i class="t7"></i>empate 7,5</span><span><i class="t5"></i>perdedor 5</span>
    <span><i class="av-g"></i>avança certo</span></div>`;
  let faseAtual = '';
  jogos.forEach(j => {
    if (fases.length > 1 && j.fase !== faseAtual) { faseAtual = j.fase; html += `<div class="fase-sub">${j.faseLabel}</div>`; }
    const pl = j.ptsPlacar, av = j.ptsAvanca;
    const tier = (pl != null) ? plTier(pl) : 't0';
    const vp = j.palp ? `<span class="val ${(pl != null && pl > 0) ? 'hl ' + tier : ''}">${j.palp.gols1}×${j.palp.gols2}</span>` : '<span class="val ref">—</span>';
    const rPl = j.real ? `<span class="val ref">${j.real.gols1}×${j.real.gols2}</span>` : '<span class="val ref">a jogar</span>';
    const va = j.pick ? `<span class="val ${(av != null && av > 0) ? 'hl av-g' : ''}">${j.pick}</span>` : '<span class="val ref">—</span>';
    const ra = (j.real && j.real.vencedor) ? `<span class="val ref">${j.real.vencedor}</span>` : '<span class="val ref">—</span>';
    const pavCls = (av != null) ? (av > 0 ? 'av-g' : 'av-0') : 't0';
    html += `<div class="jmm">
      <div class="jmm-head"><span class="bd">${bandeira(j.time1)}</span> ${j.time1} <span class="x">×</span> ${j.time2} <span class="bd">${bandeira(j.time2)}</span></div>
      <div class="jmm-grid">
        <span class="g-ppl pts ${tier}">${pl != null ? '+' + fmtP(pl) : '—'}</span>
        <span class="g-pv col-pl">${vp}</span>
        <span class="g-lv lbl-mid"><span class="tag voce">Você</span></span>
        <span class="g-av col-av">${va}</span>
        <span class="g-pav pts ${pavCls}">${av != null ? '+' + av : '—'}</span>
        <span class="g-pr col-pl">${rPl}</span>
        <span class="g-lr lbl-mid"><span class="tag real">Real</span></span>
        <span class="g-ar col-av">${ra}</span>
      </div>
    </div>`;
  });
  return html;
}

window.onload = init;
</script>

<nav class="bottom-nav">
  <a href="index.html"><span class="bnav-icon">🏠</span>Início</a>
  <a href="jogos.html"><span class="bnav-icon">📅</span>Jogos</a>
  <a href="ranking.html"><span class="bnav-icon">🏆</span>Ranking</a>
  <a href="minha-pontuacao.html" class="ativo"><span class="bnav-icon">📊</span>Pontuação</a>
  <a href="regulamento.html"><span class="bnav-icon">📋</span>Regras</a>
</nav>
</body>
</html>
