<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A237E">
  <title>MOCKUP · Mata-mata compacto</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .mp-card { background:#fff; border-radius:18px; box-shadow:0 3px 16px rgba(13,19,86,.06); padding:1.1rem 1rem; margin-bottom:1rem; }
    .mp-sec { display:flex; align-items:center; gap:.6rem; margin-bottom:.9rem; }
    .mp-sec .star { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#1A237E,#3949AB); display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .mp-sec h3 { font-size:1.08rem; font-weight:900; color:var(--azul); }
    .mp-sec h3 small { display:block; font-size:.66rem; font-weight:700; color:var(--cinza-sub); }
    .fase-sub { font-size:.7rem; font-weight:800; color:#7B1FA2; background:#F3E5F5; display:inline-block; padding:.2rem .6rem; border-radius:20px; margin:.5rem 0 .6rem; }

    /* Card de jogo COMPACTO */
    .jmm { border:1px solid var(--cinza-borda); border-radius:11px; padding:.5rem .55rem; margin-bottom:.5rem; }
    .jmm-head { display:flex; align-items:center; justify-content:center; gap:.45rem; font-weight:900; font-size:.9rem; margin-bottom:.4rem; }
    .jmm-head .bd { font-size:1.25rem; }
    .jmm-head .x { color:var(--cinza-sub); font-weight:600; }
    .jmm-grid { display:grid; grid-template-columns:auto 1fr auto 1fr auto; grid-template-areas:"ppl pv lv av pav" "ppl pr lr ar pav"; align-items:center; column-gap:.5rem; row-gap:.1rem; }
    .g-ppl { grid-area:ppl; } .g-pav { grid-area:pav; }
    .g-pv { grid-area:pv; } .g-pr { grid-area:pr; }
    .g-lv { grid-area:lv; } .g-lr { grid-area:lr; }
    .g-av { grid-area:av; } .g-ar { grid-area:ar; }
    .col-pl { text-align:right; }    /* placar à esquerda, encostado no centro */
    .col-av { text-align:left; }     /* avança à direita, encostado no centro */
    .lbl-c { text-align:center; font-size:.56rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--cinza-sub); }
    .val { font-size:.84rem; font-weight:800; color:var(--cinza-texto); white-space:nowrap; }
    .val.ref { color:var(--cinza-sub); font-weight:700; }
    .pts { font-weight:900; font-size:.82rem; padding:.2rem .55rem; border-radius:20px; align-self:center; }
    .pts.g { background:#E8F5E9; color:#1B5E20; } .pts.y { background:#FFF8E1; color:#F57F17; } .pts.n { background:#F1F3F5; color:#9AA5B1; }
    .hl-g { background:#E8F5E9; color:#1B5E20; padding:.04rem .3rem; border-radius:5px; }
    .hl-y { background:#FFF8E1; color:#F57F17; padding:.04rem .3rem; border-radius:5px; }
    .tag { font-size:.56rem; font-weight:800; padding:.1rem .35rem; border-radius:5px; }
    .tag.voce { background:#E3F2FD; color:#1565C0; } .tag.real { background:#E8F5E9; color:#2E7D32; }
    .mock-banner { background:var(--ouro-claro); border:2px solid var(--ouro); border-radius:10px; padding:.6rem .8rem; font-size:.82rem; color:#4E342E; margin-bottom:1rem; }
  </style>
</head>
<body>
<header>
  <span class="logo">📊</span>
  <div class="header-texto"><h1>MOCKUP · Mata-mata</h1><p>versão compacta</p></div>
</header>

<div class="container">
  <div class="mock-banner">🔎 <strong>Versão compacta</strong> — tudo num bloco: <strong>+placar</strong> à esquerda, placares no centro-esquerda, rótulos <strong>Você/Real</strong> no meio, time que avança à direita e <strong>+avança</strong> na ponta direita.</div>

  <div class="mp-card">
    <div class="mp-sec"><div class="star">⚽</div><h3>Mata-mata<small>Camadas 2 e 3 · quem avança + placar</small></h3></div>
    <div class="fase-sub">Rodada de 32</div>
    <div id="lista"></div>
  </div>
</div>

<script>
const JOGOS = [
  { t1:'BRA', t2:'MAR', vp:'3×1', vpC:'hl-y', va:'BRA', vaC:'hl-g', rp:'2×1', ra:'BRA', ptsPl:5,  ptsAv:2 },
  { t1:'ESP', t2:'URU', vp:'2×0', vpC:'hl-g', va:'ESP', vaC:'hl-g', rp:'2×0', ra:'ESP', ptsPl:15, ptsAv:2 },
  { t1:'CUR', t2:'NOR', vp:'2×1', vpC:'',     va:'CUR', vaC:'hl-g', rp:'3×0', ra:'CUR', ptsPl:0,  ptsAv:2 },
  { t1:'SEN', t2:'EUA', vp:null,  vpC:'',     va:null,  vaC:'',     rp:'2×1', ra:'SEN', ptsPl:0,  ptsAv:0, semp:true },
];

function vHtml(v, cls) { return v ? `<span class="${cls}">${v}</span>` : '<span class="val ref">—</span>'; }

document.getElementById('lista').innerHTML = JOGOS.map(j => {
  const plCls = j.semp ? 'n' : (j.ptsPl>=15?'g':(j.ptsPl>0?'y':'n'));
  const avCls = j.semp ? 'n' : (j.ptsAv>0?'g':'n');
  return `<div class="jmm">
    <div class="jmm-head"><span class="bd">${bandeira(j.t1)}</span> ${j.t1} <span class="x">×</span> ${j.t2} <span class="bd">${bandeira(j.t2)}</span></div>
    <div class="jmm-grid">
      <span class="g-ppl pts ${plCls}">${j.semp?'—':'+'+j.ptsPl}</span>
      <span class="g-pv col-pl">${vHtml(j.vp, 'val ' + j.vpC)}</span>
      <span class="g-lv lbl-c">Você</span>
      <span class="g-av col-av">${vHtml(j.va, 'val ' + j.vaC)}</span>
      <span class="g-pav pts ${avCls}">${j.semp?'—':'+'+j.ptsAv}</span>
      <span class="g-pr col-pl"><span class="val ref">${j.rp}</span></span>
      <span class="g-lr lbl-c">Real</span>
      <span class="g-ar col-av"><span class="val ref">${j.ra}</span></span>
    </div>
  </div>`;
}).join('');
aplicarTwemoji(document.body);
</script>
</body>
</html>
