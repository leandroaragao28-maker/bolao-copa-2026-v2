<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A237E">
  <title>MOCKUP · Mata-mata compacto v2</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .mp-card { background:#fff; border-radius:18px; box-shadow:0 3px 16px rgba(13,19,86,.06); padding:1.1rem 1rem; margin-bottom:1rem; }
    .mp-sec { display:flex; align-items:center; gap:.6rem; margin-bottom:.8rem; }
    .mp-sec .star { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#1A237E,#3949AB); display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .mp-sec h3 { font-size:1.08rem; font-weight:900; color:var(--azul); }
    .mp-sec h3 small { display:block; font-size:.66rem; font-weight:700; color:var(--cinza-sub); }
    .fase-sub { font-size:.7rem; font-weight:800; color:#7B1FA2; background:#F3E5F5; display:inline-block; padding:.2rem .6rem; border-radius:20px; margin:.4rem 0 .5rem; }

    /* Níveis de placar (Camada 3) — cores distintas */
    .t15 { background:#E8F5E9; color:#1B5E20; }   /* exato */
    .t10 { background:#E0F2F1; color:#00695C; }   /* placar do vencedor */
    .t7  { background:#FFF8E1; color:#F57F17; }   /* empate (um lado) */
    .t5  { background:#FFE0CC; color:#BF360C; }   /* placar do perdedor */
    .t0  { background:#F1F3F5; color:#9AA5B1; }   /* zerou */
    .av-g { background:#E8F5E9; color:#1B5E20; }  /* avança certo (Camada 2) */
    .av-0 { background:#F1F3F5; color:#9AA5B1; }

    .mm-leg { display:flex; flex-wrap:wrap; gap:.5rem .9rem; font-size:.66rem; font-weight:700; color:var(--cinza-sub); margin-bottom:.7rem; }
    .mm-leg span { display:inline-flex; align-items:center; gap:.3rem; }
    .mm-leg i { width:.85rem; height:.85rem; border-radius:3px; display:inline-block; }

    .jmm { border:1px solid var(--cinza-borda); border-radius:11px; padding:.5rem .55rem; margin-bottom:.5rem; }
    .jmm-head { display:flex; align-items:center; justify-content:center; gap:.45rem; font-weight:900; font-size:.9rem; margin-bottom:.45rem; }
    .jmm-head .bd { font-size:1.25rem; }
    .jmm-head .x { color:var(--cinza-sub); font-weight:600; }
    .jmm-grid { display:grid; grid-template-columns:auto 1fr auto 1fr auto; grid-template-areas:"ppl pv lv av pav" "ppl pr lr ar pav"; align-items:center; column-gap:.5rem; row-gap:.22rem; }
    .g-ppl { grid-area:ppl; } .g-pav { grid-area:pav; }
    .g-pv { grid-area:pv; } .g-pr { grid-area:pr; }
    .g-lv { grid-area:lv; } .g-lr { grid-area:lr; }
    .g-av { grid-area:av; } .g-ar { grid-area:ar; }
    .col-pl { text-align:right; } .col-av { text-align:left; }
    .lbl-mid { display:flex; justify-content:center; }
    .val { font-size:.84rem; font-weight:800; color:var(--cinza-texto); white-space:nowrap; }
    .val.ref { color:var(--cinza-sub); font-weight:700; }
    .hl { padding:.05rem .34rem; border-radius:5px; }
    .pts { font-weight:900; font-size:.82rem; padding:.2rem .55rem; border-radius:20px; align-self:center; }
    /* rótulos Você/Real iguais à Camada 1 */
    .tag { font-size:.56rem; font-weight:800; padding:.13rem .42rem; border-radius:5px; text-transform:uppercase; letter-spacing:.03em; }
    .tag.voce { background:#E3F2FD; color:#1565C0; } .tag.real { background:#E8F5E9; color:#2E7D32; }
    .mock-banner { background:var(--ouro-claro); border:2px solid var(--ouro); border-radius:10px; padding:.6rem .8rem; font-size:.82rem; color:#4E342E; margin-bottom:1rem; }
  </style>
</head>
<body>
<header>
  <span class="logo">📊</span>
  <div class="header-texto"><h1>MOCKUP · Mata-mata</h1><p>compacto v2</p></div>
</header>

<div class="container">
  <div class="mock-banner">🔎 <strong>Ajustes:</strong> rótulos <strong>Você</strong> (azul) e <strong>Real</strong> (verde) iguais à Camada 1, e o placar agora tem <strong>cor por nível</strong> de acerto.</div>

  <div class="mp-card">
    <div class="mp-sec"><div class="star">⚽</div><h3>Mata-mata<small>Camadas 2 e 3 · quem avança + placar</small></h3></div>
    <div class="mm-leg">
      <span><i class="t15"></i>exato 15</span>
      <span><i class="t10"></i>vencedor 10</span>
      <span><i class="t7"></i>empate 7,5</span>
      <span><i class="t5"></i>perdedor 5</span>
      <span><i class="av-g"></i>avança certo</span>
    </div>
    <div class="fase-sub">Rodada de 32</div>
    <div id="lista"></div>
  </div>
</div>

<script>
const JOGOS = [
  { t1:'ESP', t2:'URU', vp:'2×0', pl:15, va:'ESP', av:2,  rp:'2×0', ra:'ESP' },
  { t1:'ALE', t2:'FRA', vp:'2×1', pl:10, va:'ALE', av:2,  rp:'2×0', ra:'ALE' },
  { t1:'POR', t2:'COL', vp:'2×0', pl:7.5, va:'COL', av:0, rp:'2×2', ra:'POR' },
  { t1:'BRA', t2:'MAR', vp:'3×1', pl:5,  va:'BRA', av:2,  rp:'2×1', ra:'BRA' },
  { t1:'CUR', t2:'NOR', vp:'2×1', pl:0,  va:'CUR', av:2,  rp:'3×0', ra:'CUR' },
  { t1:'SEN', t2:'EUA', vp:null,  pl:0,  va:null,  av:0,  rp:'2×1', ra:'SEN', semp:true },
];
function plTier(p){ return p>=15?'t15':p>=10?'t10':p>=7.5?'t7':p>=5?'t5':'t0'; }
function fmtPts(p){ return (p===7.5?'7,5':p); }

document.getElementById('lista').innerHTML = JOGOS.map(j => {
  const tier = plTier(j.pl);
  const vp = j.vp ? `<span class="val ${j.pl>0?'hl '+tier:''}">${j.vp}</span>` : '<span class="val ref">—</span>';
  const va = j.va ? `<span class="val ${j.av>0?'hl av-g':''}">${j.va}</span>` : '<span class="val ref">—</span>';
  return `<div class="jmm">
    <div class="jmm-head"><span class="bd">${bandeira(j.t1)}</span> ${j.t1} <span class="x">×</span> ${j.t2} <span class="bd">${bandeira(j.t2)}</span></div>
    <div class="jmm-grid">
      <span class="g-ppl pts ${j.semp?'t0':tier}">${j.semp?'—':'+'+fmtPts(j.pl)}</span>
      <span class="g-pv col-pl">${vp}</span>
      <span class="g-lv lbl-mid"><span class="tag voce">Você</span></span>
      <span class="g-av col-av">${va}</span>
      <span class="g-pav pts ${j.semp?'t0':(j.av>0?'av-g':'av-0')}">${j.semp?'—':'+'+j.av}</span>
      <span class="g-pr col-pl"><span class="val ref">${j.rp}</span></span>
      <span class="g-lr lbl-mid"><span class="tag real">Real</span></span>
      <span class="g-ar col-av"><span class="val ref">${j.ra}</span></span>
    </div>
  </div>`;
}).join('');
aplicarTwemoji(document.body);
</script>
</body>
</html>
